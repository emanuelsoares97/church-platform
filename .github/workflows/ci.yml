name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  django-ci:
    name: Checks, tests and coverage
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "True"
      DATABASE_URL: sqlite:///test_ci.sqlite3
      CLOUDINARY_CLOUD_NAME: ci-cloud
      CLOUDINARY_API_KEY: ci-key
      CLOUDINARY_API_SECRET: ci-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Coverage run
        run: |
          python -m coverage erase
          python -m coverage run --source=core,events,gallery,management,church_platform manage.py test

      - name: Coverage report (fail under 90%)
        run: python -m coverage report -m --fail-under=90