<!-- templates/base.html -->
<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SNT Almada{% endblock %}</title>

  {% block extra_head %}{% endblock %}
</head>
<body>
  <header style="padding:16px;border-bottom:1px solid #ddd;">
    <strong>SNT Almada</strong> • Sistema de Inscrições
    <nav style="margin-top:8px;">
      <a href="{% url 'events:event_list' %}">Eventos</a>
    </nav>
  </header>

  <main style="max-width:1100px;margin:0 auto;padding:16px;">
    {% if messages %}
      <div style="margin-bottom:12px;">
        {% for message in messages %}
          <div style="padding:10px;border:1px solid #ccc;margin-bottom:6px;">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <footer style="padding:16px;border-top:1px solid #ddd;">
    SNT Almada
  </footer>

  {% block extra_js %}{% endblock %}
</body>
</html>
